<!DOCTYPE html>
<html>

<head>
    <title>Gesture Image Demo</title>

    <!-- ✅ FIXED viewport -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- load your component -->
    <script src="gesture-image.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 20px;
            background: #222;
            color: white;
            font-family: sans-serif;

            /* ✅ IMPORTANT */
            touch-action: manipulation;
        }

        gesture-image {
            width: 300px;
            height: 400px;
            border: 2px solid #555;

            /* allow custom gestures inside */
            touch-action: none;
        }
    </style>
</head>

<body>

    <h3>Gesture Image Editor</h3>

    <gesture-image id="editor"></gesture-image>

    <br><br>

    <button onclick="loadImage()">Load Image</button>
    <button onclick="exportImage()">Export</button>

    <script>
        const editor = document.getElementById("editor");

        function loadImage() {
            editor.setImage("https://picsum.photos/800/1200");
        }

        async function exportImage() {
            const data = await editor.exportImage();
            console.log(data);

            const img = document.createElement("img");
            img.src = data;
            img.style.width = "200px";
            document.body.appendChild(img);
        }

        // -------------------------------
        // ✅ HARD BLOCK PAGE ZOOM (IMPORTANT)
        // -------------------------------

        // block pinch zoom
        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) e.preventDefault();
        }, { passive: false });

        // block double-tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // iOS Safari fixes
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());
    </script>

</body>

</html>
