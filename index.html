<!DOCTYPE html>
<html>

<head>
	<title>Image Editor POC</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	<link rel="icon" href="data:,">

	<script src="gesture-image.js"></script>

	<style>
		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			height: 100%;
			font-family: system-ui, sans-serif;
			background: #111;
			color: #fff;
			touch-action: manipulation;
		}

		.app {
			display: flex;
			flex-direction: column;
			height: 100%;
		}

		.header {
			padding: 12px;
			text-align: center;
			border-bottom: 1px solid #333;
			background: #181818;
			font-weight: 600;
		}

		.editor-container {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 10px;
		}

		gesture-image {
			width: 100%;
			max-width: 400px;
			aspect-ratio: 3 / 4;
			border-radius: 12px;
			overflow: hidden;
			background: #000;
			touch-action: none;
		}

		.controls {
			padding: 12px;
			background: #181818;
			border-top: 1px solid #333;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.row {
			display: flex;
			gap: 10px;
		}

		button,
		label {
			flex: 1;
			padding: 12px;
			border-radius: 10px;
			border: none;
			font-size: 14px;
			text-align: center;
			cursor: pointer;
			background: #2a2a2a;
			color: #fff;
		}

		.primary {
			background: #4caf50;
		}

		.upload {
			background: #2196f3;
		}

		input[type="file"] {
			display: none;
		}

		/* 🎚 Slider UI */
		.slider-group {
			display: flex;
			flex-direction: column;
			gap: 6px;
		}

		.slider-label {
			font-size: 12px;
			color: #aaa;
			display: flex;
			justify-content: space-between;
		}

		input[type="range"] {
			width: 100%;
			appearance: none;
			height: 6px;
			border-radius: 6px;
			background: #333;
			outline: none;
		}

		input[type="range"]::-webkit-slider-thumb {
			appearance: none;
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: #4caf50;
			cursor: pointer;
		}

		input[type="range"]::-moz-range-thumb {
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: #4caf50;
			cursor: pointer;
		}
	</style>
</head>

<body>

	<div class="app">

		<div class="header">Image Editor</div>

		<div class="editor-container">
			<gesture-image id="editor"></gesture-image>
		</div>

		<div class="controls">

			<!-- Upload / Reset / Export -->
			<div class="row">
				<label class="upload">
					Upload
					<input type="file" id="fileInput" accept="image/*">
				</label>
				<button onclick="reset()">Reset</button>
				<button class="primary" onclick="exportImage()">Export</button>
			</div>

			<!-- Zoom Slider -->
			<div class="slider-group">
				<div class="slider-label">
					<span>Zoom</span>
					<span id="zoomVal">1.00x</span>
				</div>
				<input type="range" id="zoomSlider" min="0.5" max="3" step="0.01" value="1">
			</div>

			<!-- Rotate Slider -->
			<div class="slider-group">
				<div class="slider-label">
					<span>Rotate</span>
					<span id="rotateVal">0°</span>
				</div>
				<input type="range" id="rotateSlider" min="-180" max="180" step="1" value="0">
			</div>

		</div>

	</div>

	<script>
		const editor = document.getElementById("editor");
		const fileInput = document.getElementById("fileInput");

		const zoomSlider = document.getElementById("zoomSlider");
		const rotateSlider = document.getElementById("rotateSlider");

		const zoomVal = document.getElementById("zoomVal");
		const rotateVal = document.getElementById("rotateVal");

		// Load default
		editor.setImage("https://picsum.photos/800/1200");

		// Upload
		fileInput.addEventListener("change", async (e) => {
			const file = e.target.files[0];
			if (!file) return;

			const reader = new FileReader();
			reader.onload = () => editor.setImage(reader.result);
			reader.readAsDataURL(file);

			fileInput.value = "";
		});

		// Reset
		function reset() {
			editor.resetTransform();
			zoomSlider.value = 1;
			rotateSlider.value = 0;
			updateLabels();
		}

		// Export
		async function exportImage() {
			const data = await editor.exportImage();

			const link = document.createElement("a");
			link.href = data;
			link.download = `image-${Date.now()}.png`;
			link.click();
		}

		// Zoom control
		zoomSlider.addEventListener("input", () => {
			const val = parseFloat(zoomSlider.value);
			editor.setZoom(val);
			updateLabels();
		});

		// Rotate control
		rotateSlider.addEventListener("input", () => {
			const val = parseFloat(rotateSlider.value);
			editor.setRotation(val);
			updateLabels();
		});

		function updateLabels() {
			zoomVal.innerText = zoomSlider.value + "x";
			rotateVal.innerText = rotateSlider.value + "°";
		}

		// Mobile zoom blockers
		document.addEventListener('touchmove', e => {
			if (e.scale !== 1) e.preventDefault();
		}, { passive: false });

		document.addEventListener('gesturestart', e => e.preventDefault());
		document.addEventListener('gesturechange', e => e.preventDefault());
		document.addEventListener('gestureend', e => e.preventDefault());
	</script>

</body>

</html>
