<!DOCTYPE html>
<html>

<head>
	<title>Gestro Demo</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	<style>
		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			height: 100%;
			font-family: system-ui, sans-serif;
			background: #111;
			color: #fff;
		}

		.app {
			display: flex;
			flex-direction: column;
			height: 100%;
		}

		.editor-container {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 10px;
		}

		gestro-image {
			width: 100%;
			max-width: 400px;
			aspect-ratio: 3 / 4;
			border-radius: 12px;
			overflow: hidden;
		}

		.controls {
			padding: 14px;
			display: flex;
			flex-direction: column;
			gap: 14px;
			background: #161616;
			border-top: 1px solid #2a2a2a;
		}

		.row {
			display: flex;
			gap: 10px;
		}

		button,
		label {
			flex: 1;
			padding: 12px;
			border-radius: 10px;
			border: none;
			background: #2a2a2a;
			color: #fff;
			cursor: pointer;
			text-align: center;
			font-size: 14px;
		}

		button:hover,
		label:hover {
			background: #333;
		}

		button:disabled {
			opacity: 0.4;
			cursor: not-allowed;
		}

		.primary {
			background: #4caf50;
		}

		.primary:hover {
			background: #43a047;
		}

		.upload {
			background: #2196f3;
		}

		.upload:hover {
			background: #1e88e5;
		}

		input[type="file"] {
			display: none;
		}

		.control-group {
			display: flex;
			flex-direction: column;
			gap: 6px;
			padding: 12px;
			background: #181818;
			border-radius: 12px;
			border: 1px solid #2a2a2a;
		}

		.label {
			display: flex;
			justify-content: space-between;
			font-size: 13px;
		}

		input[type="range"] {
			width: 100%;
			height: 4px;
			border-radius: 999px;
			background: linear-gradient(to right, #4caf50 var(--progress, 50%), #2b2b2b var(--progress, 50%));
		}
	</style>

	<script type="module">
		import "../src/gestro-image.js";

		window.addEventListener("DOMContentLoaded", () => {

			const editor = document.getElementById("editor");
			const fileInput = document.getElementById("fileInput");

			const zoomSlider = document.getElementById("zoomSlider");
			const rotateSlider = document.getElementById("rotateSlider");

			const zoomValue = document.getElementById("zoomValue");
			const rotateValue = document.getElementById("rotateValue");

			const undoBtn = document.getElementById("undoBtn");
			const redoBtn = document.getElementById("redoBtn");

			const updateSliderProgress = (slider) => {
				const percent = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
				slider.style.setProperty("--progress", percent + "%");
			};

			// INIT IMAGE
			const init = () => {
				if (!editor || typeof editor.setImage !== "function") {
					requestAnimationFrame(init);
					return;
				}
				editor.setImage("https://picsum.photos/800/1200");
			};
			init();

			// UPLOAD
			fileInput.onchange = e => {
				const file = e.target.files[0];
				if (!file) return;

				const reader = new FileReader();
				reader.onload = () => editor.setImage(reader.result);
				reader.readAsDataURL(file);

				fileInput.value = "";
			};

			// RESET
			window.reset = () => editor.resetTransform();

			// EXPORT
			window.exportImage = async () => {
				const data = await editor.exportImage();
				const a = document.createElement("a");
				a.href = data;
				a.download = "gestro.png";
				a.click();
			};

			// SLIDERS
			zoomSlider.oninput = () => {
				editor.setScale(parseFloat(zoomSlider.value));
			};

			rotateSlider.oninput = () => {
				editor.setRotation(parseFloat(rotateSlider.value));
			};

			// UNDO / REDO
			undoBtn.onclick = () => editor.undo();
			redoBtn.onclick = () => editor.redo();

			// KEYBOARD SUPPORT
			window.addEventListener("keydown", (e) => {
				if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z") {
					e.preventDefault();
					e.shiftKey ? editor.redo() : editor.undo();
				}
			});

			// SYNC UI WITH STATE
			editor.addEventListener("transform", (e) => {
				const { scale, rotation } = e.detail;

				zoomSlider.value = scale;
				rotateSlider.value = rotation;

				zoomValue.textContent = scale.toFixed(2) + "x";
				rotateValue.textContent = rotation + "°";

				updateSliderProgress(zoomSlider);
				updateSliderProgress(rotateSlider);

				// enable / disable buttons
				undoBtn.disabled = editor._history.length <= 1;
				redoBtn.disabled = editor._future.length === 0;
			});

			updateSliderProgress(zoomSlider);
			updateSliderProgress(rotateSlider);
		});
	</script>

</head>

<body>

	<div class="app">

		<div class="editor-container">
			<gestro-image id="editor"></gestro-image>
		</div>

		<div class="controls">

			<div class="row">
				<label class="upload">
					📤 Upload
					<input type="file" id="fileInput" accept="image/*">
				</label>

				<button onclick="reset()">🔄 Reset</button>
				<button class="primary" onclick="exportImage()">⬇️ Export</button>
			</div>

			<!-- ✅ UNDO / REDO -->
			<div class="row">
				<button id="undoBtn">↩️ Undo</button>
				<button id="redoBtn">↪️ Redo</button>
			</div>

			<div class="control-group">
				<div class="label">
					<span>🔍 Scale</span>
					<span id="zoomValue">1.00x</span>
				</div>
				<input type="range" id="zoomSlider" min="0.5" max="3" step="0.01" value="1">
			</div>

			<div class="control-group">
				<div class="label">
					<span>🔄 Rotate</span>
					<span id="rotateValue">0°</span>
				</div>
				<input type="range" id="rotateSlider" min="-180" max="180" step="1" value="0">
			</div>

		</div>

	</div>

</body>

</html>
